<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FX rates calendar</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #9a9a9a; --line: #e4e4e4;
    --cell: #fff; --accent: #0b7a3b; --shadow: rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --fg: #eee; --muted: #666; --line: #2a2a2a;
      --cell: #1a1a1a; --accent: #35d07f; --shadow: rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 1.5rem 1rem; background: var(--bg); color: var(--fg);
    font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
  h1 { font-size: 1.05rem; font-weight: 600; margin: 0; min-width: 9rem; text-align: center; }
  button {
    background: var(--cell); color: var(--fg); border: 1px solid var(--line);
    border-radius: 8px; width: 2.2rem; height: 2.2rem; font-size: 1.1rem; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 640px; }
  .dow { text-align: center; font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .cell {
    background: var(--cell); border: 1px solid var(--line); border-radius: 10px;
    aspect-ratio: 1; padding: .35rem .4rem; display: flex; flex-direction: column;
    position: relative; overflow: visible;
  }
  .cell.empty { background: transparent; border: none; }
  .cell .day { font-size: .78rem; color: var(--muted); }
  .cell.has .day { color: var(--fg); }
  .cell .rates { margin-top: auto; display: flex; flex-direction: column; gap: 1px; }
  .cell .rate {
    display: flex; justify-content: space-between; align-items: baseline; gap: .25rem;
    font-size: .8rem; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .cell .rate b { font-weight: 500; font-size: .62rem; color: var(--muted); letter-spacing: .03em; }
  .cell.has { cursor: pointer; }
  .cell.has:hover { border-color: var(--accent); }
  .pop {
    display: none; position: absolute; z-index: 5; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); background: var(--cell); border: 1px solid var(--line);
    border-radius: 10px; padding: .6rem .75rem; box-shadow: 0 6px 20px var(--shadow);
    white-space: nowrap; font-size: .82rem;
  }
  .cell.has:hover .pop, .cell.open .pop { display: block; }
  .pop table { border-collapse: collapse; }
  .pop td { padding: .1rem .5rem; }
  .pop td:first-child { color: var(--muted); text-align: left; }
  .pop td { text-align: right; font-variant-numeric: tabular-nums; }
  footer { margin-top: 1.2rem; color: var(--muted); font-size: .75rem; }
</style>
</head>
<body>
<header>
  <button id="prev" aria-label="Previous month">‹</button>
  <h1 id="title">—</h1>
  <button id="next" aria-label="Next month">›</button>
</header>
<div class="grid" id="dows"></div>
<div class="grid" id="cal" style="margin-top:6px"></div>
<footer>cells show sell rate in UAH · popup shows buy / sell · times in Europe/Kyiv</footer>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const fmt = (n, dp) => n == null ? "—" : n.toFixed(dp);

let data = {};
let view; // {y, m}

function keysSorted() { return Object.keys(data).sort(); }

function render() {
  document.getElementById("title").textContent = `${MONTHS[view.m]} ${view.y}`;
  const cal = document.getElementById("cal");
  cal.innerHTML = "";

  const first = new Date(Date.UTC(view.y, view.m, 1));
  const lead = (first.getUTCDay() + 6) % 7; // Mon-based
  const days = new Date(Date.UTC(view.y, view.m + 1, 0)).getUTCDate();

  for (let i = 0; i < lead; i++) cal.appendChild(cell());
  for (let d = 1; d <= days; d++) {
    const key = `${view.y}-${String(view.m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    cal.appendChild(cell(d, data[key]));
  }
}

function cell(day, rec) {
  const el = document.createElement("div");
  el.className = "cell" + (day == null ? " empty" : "") + (rec ? " has" : "");
  if (day == null) return el;

  el.innerHTML = `<span class="day">${day}</span>`;
  if (rec) {
    const line = (label, r) =>
      r ? `<span class="rate"><b>${label}</b>${fmt(r.sell, 2)}</span>` : "";
    el.insertAdjacentHTML(
      "beforeend",
      `<div class="rates">${line("USD", rec.usdUah)}${line("USDT", rec.usdtUah)}</div>`
    );
    el.insertAdjacentHTML("beforeend", popup(rec));
    el.addEventListener("click", () => el.classList.toggle("open"));
  }
  return el;
}

function row(label, r, dp) {
  return r ? `<tr><td>${label}</td><td>${fmt(r.buy, dp)}</td><td>${fmt(r.sell, dp)}</td></tr>` : "";
}

function popup(rec) {
  return `<div class="pop"><table>
    ${row("USD/UAH", rec.usdUah, 2)}
    ${row("USDT/USD", rec.usdtUsd, 3)}
    ${row("USDT/UAH", rec.usdtUah, 2)}
  </table></div>`;
}

function step(delta) {
  let m = view.m + delta, y = view.y;
  if (m < 0) { m = 11; y--; } else if (m > 11) { m = 0; y++; }
  view = { y, m };
  render();
}

document.getElementById("prev").onclick = () => step(-1);
document.getElementById("next").onclick = () => step(1);
document.getElementById("dows").innerHTML = DOW.map((d) => `<div class="dow">${d}</div>`).join("");

fetch("data.json")
  .then((r) => r.json())
  .then((d) => {
    data = d;
    const keys = keysSorted();
    const last = keys.length ? keys[keys.length - 1] : new Date().toISOString().slice(0, 10);
    const [y, m] = last.split("-").map(Number);
    view = { y, m: m - 1 };
    render();
  })
  .catch(() => { document.getElementById("title").textContent = "no data"; });
</script>
</body>
</html>
